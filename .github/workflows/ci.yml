name: CI

on:
  pull_request:
    branches: [main, local-pr-tests]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.lock && pip install -e . --no-deps

      - name: Lint
        run: ./scripts/lint.sh

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements-dev.lock && pip install -e . --no-deps

      - name: Test with coverage
        run: ./scripts/test.sh
        env:
          COVERAGE_DIR: coverage/agentic-perf

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage/agentic-perf/

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.lock && pip install -e . --no-deps && pip install bandit pip-audit

      - name: Static security scan (bandit)
        run: |
          # Save full report (medium+) as artifact — always succeeds
          bandit -r agents/ providers/ orchestrator/ state_store/ \
            -ll --format json --output bandit-report.json || true
          # Display medium+ findings for visibility — informational
          bandit -r agents/ providers/ orchestrator/ state_store/ -ll || true
          # Fail the job only on HIGH severity findings
          bandit -r agents/ providers/ orchestrator/ state_store/ -lll

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip-audit --format json --output pip-audit-report.json
          pip-audit --desc

      - name: Upload security reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json

  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, security]
    if: always()
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Generate CI summary
        run: |
          python3 << 'PYEOF'
          import json, os, glob
          from collections import Counter

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")

          def write_summary(text):
              with open(summary_path, "a") as f:
                  f.write(text + "\n")
              print(text)

          # --- Coverage Summary ---
          def read_cov(path):
              if not os.path.isfile(path):
                  return None, None
              with open(path) as f:
                  data = json.load(f)
              t = data.get("totals", {})
              return t.get("covered_lines", 0), t.get("num_statements", 0)

          def pct(covered, total):
              return (covered / total * 100) if total else 0

          cov_rows = []
          for cov_file in sorted(glob.glob("artifacts/coverage-*/coverage.json")):
              dirname = os.path.basename(os.path.dirname(cov_file))
              c, t = read_cov(cov_file)
              if c is not None:
                  cov_rows.append((dirname, c, t))

          if cov_rows:
              lines = [
                  "## Test Coverage",
                  "",
                  "| Build | Covered / Total | Percent |",
                  "|-------|-----------------|---------|",
              ]
              for name, covered, total in cov_rows:
                  lines.append(
                      f"| {name} | {covered}/{total}"
                      f" | {pct(covered, total):.1f}% |"
                  )
              write_summary("\n".join(lines))

          # --- Security Summary (Bandit) ---
          bandit_path = "artifacts/security-reports/bandit-report.json"
          if os.path.isfile(bandit_path):
              with open(bandit_path) as f:
                  bandit = json.load(f)
              results = bandit.get("results", [])
              metrics = bandit.get("metrics", {}).get("_totals", {})
              loc = metrics.get("loc", 0)

              by_sev = Counter(r["issue_severity"] for r in results)
              high = by_sev.get("HIGH", 0)
              medium = by_sev.get("MEDIUM", 0)
              low = by_sev.get("LOW", 0)

              by_type = Counter(
                  f"{r['test_id']}: {r['test_name']}" for r in results
              )

              lines = [
                  "",
                  "## Security Scan (Bandit)",
                  "",
                  f"Scanned **{loc:,}** lines of code.",
                  "",
                  "| Severity | Count |",
                  "|----------|-------|",
                  f"| 🔴 High | {high} |",
                  f"| 🟡 Medium | {medium} |",
                  f"| ⚪ Low | {low} |",
              ]

              if results:
                  lines += [
                      "",
                      "| Finding | Count | Files |",
                      "|---------|-------|-------|",
                  ]
                  for issue, count in by_type.most_common():
                      files = sorted(set(
                          os.path.basename(r["filename"])
                          for r in results
                          if f"{r['test_id']}: {r['test_name']}" == issue
                      ))
                      files_str = ", ".join(files[:3])
                      if len(files) > 3:
                          files_str += f" (+{len(files)-3} more)"
                      lines.append(f"| {issue} | {count} | {files_str} |")

              write_summary("\n".join(lines))
          else:
              write_summary("\n## Security Scan\n\nNo bandit report found.")

          # --- Dependency Audit (pip-audit) ---
          audit_path = "artifacts/security-reports/pip-audit-report.json"
          if os.path.isfile(audit_path):
              with open(audit_path) as f:
                  audit = json.load(f)
              # pip-audit JSON: {"dependencies": [...], "fixes": [...]}
              deps = audit.get("dependencies", audit) if isinstance(audit, dict) else audit
              vulns = [d for d in deps if isinstance(d, dict) and d.get("vulns")]
              if vulns:
                  lines = [
                      "",
                      "## Dependency Vulnerabilities (pip-audit)",
                      "",
                      "| Package | Version | Vulnerability |",
                      "|---------|---------|---------------|",
                  ]
                  for dep in vulns:
                      for v in dep["vulns"]:
                          lines.append(
                              f"| {dep['name']} | {dep['version']}"
                              f" | {v.get('id', 'unknown')} |"
                          )
                  write_summary("\n".join(lines))
              else:
                  write_summary(
                      "\n## Dependency Audit\n\n"
                      "✅ No known vulnerabilities found."
                  )
          PYEOF
