<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic Perf</title>
<style>
:root {
  --bg: #1a1b26;
  --bg-surface: #24283b;
  --bg-hover: #2f3347;
  --bg-input: #1a1b26;
  --border: #3b4261;
  --text: #c0caf5;
  --text-muted: #565f89;
  --text-bright: #e0e6ff;
  --accent: #7aa2f7;
  --accent-dim: #3d59a1;
  --green: #9ece6a;
  --yellow: #e0af68;
  --orange: #ff9e64;
  --red: #f7768e;
  --purple: #bb9af7;
  --cyan: #7dcfff;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.6;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

header {
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

header .container {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

header h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-bright);
}

header h1 span { color: var(--accent); }

.health-stats {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--text-muted);
}

.health-stats .stat-val { color: var(--text); font-weight: 600; }

.breadcrumb {
  padding: 12px 0;
  font-size: 13px;
  color: var(--text-muted);
}

.breadcrumb a { color: var(--accent); }

.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.badge-new { background: var(--accent-dim); color: var(--accent); }
/*
 * Badge color categories:
 *   Cyan   = LLM reasoning (agent is thinking/deciding)
 *   Yellow = External action (MCP/skill/SSH work in progress)
 *   Green  = Active workload execution on target
 *   Purple = LLM analysis of results
 *   Orange = Winding down / cleanup
 *   Red    = Blocked on human input
 *   Green (dark bg) = Terminal success (closed)
 */
.badge-triage_pending { background: #2d3a5c; color: var(--cyan); }
.badge-awaiting_hardware { background: #3a3520; color: var(--yellow); }
.badge-awaiting_provision { background: #3a3520; color: var(--yellow); }
.badge-executing_benchmark { background: #1a3a2a; color: var(--green); }
.badge-awaiting_review { background: #352a3a; color: var(--purple); }
.badge-awaiting_teardown { background: #3a2a20; color: var(--orange); }
/* Investigation loop statuses use the same color categories */
.badge-gathering_context { background: #2d3a5c; color: var(--cyan); }
.badge-planning_investigation { background: #2d3a5c; color: var(--cyan); }
.badge-evaluating_convergence { background: #352a3a; color: var(--purple); }
.badge-synthesizing_results { background: #3a2a20; color: var(--orange); }
.badge-awaiting_customer_guidance { background: #3a1a1a; color: var(--red); }
.badge-retrospective_pending { background: #2d3a5c; color: var(--cyan); }
.badge-closed { background: #1a2a1a; color: var(--green); }

.filters {
  display: flex;
  gap: 12px;
  align-items: center;
  margin: 16px 0;
}

.filters select {
  background: var(--bg-input);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
}

.filters select:focus { outline: none; border-color: var(--accent); }

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 8px;
}

th {
  text-align: left;
  padding: 10px 12px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}

td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

tr.ticket-row { cursor: pointer; transition: background 0.15s; }
tr.ticket-row:hover { background: var(--bg-hover); }

.ticket-id {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
}

.ticket-summary {
  color: var(--text-bright);
  max-width: 500px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.ticket-time {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }

/* Detail view: two-panel split layout */
body:has(.detail-view) { overflow: hidden; }
body:has(.detail-view) .container { max-width: none; }

.detail-view {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 54px);
  overflow: hidden;
}

/* Toolbar: compact sticky bar with ticket info + controls */
.detail-toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.detail-toolbar .breadcrumb {
  padding: 0;
  margin: 0;
}

.detail-toolbar .ticket-id { font-size: 14px; }

.detail-toolbar .summary {
  font-size: 14px;
  color: var(--text-bright);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  min-width: 0;
}

.toolbar-controls {
  display: flex;
  gap: 4px;
  align-items: center;
  flex-shrink: 0;
}

.toolbar-btn {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 3px 8px;
  cursor: pointer;
  font-size: 11px;
  transition: background 0.15s, border-color 0.15s;
  white-space: nowrap;
}

.toolbar-btn:hover { background: var(--bg-hover); }
.toolbar-btn.active { border-color: var(--accent); color: var(--accent); }

.toolbar-btn.btn-stop-graceful {
  border-color: var(--yellow);
  color: var(--yellow);
}
.toolbar-btn.btn-stop-graceful:hover {
  background: rgba(224, 175, 104, 0.15);
}
.toolbar-btn.btn-stop-hard {
  border-color: var(--red);
  color: var(--red);
}
.toolbar-btn.btn-stop-hard:hover {
  background: rgba(247, 118, 142, 0.15);
}
.toolbar-btn.btn-stop-all {
  border-color: var(--red);
  color: var(--red);
  margin-left: 8px;
}
.toolbar-btn.btn-stop-all:hover {
  background: rgba(247, 118, 142, 0.15);
}

.stop-confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.stop-confirm-dialog {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  max-width: 400px;
  width: 90%;
}
.stop-confirm-dialog h3 {
  margin-bottom: 12px;
  color: var(--text-bright);
}
.stop-confirm-dialog p {
  margin-bottom: 16px;
  color: var(--text-muted);
  font-size: 13px;
}
.stop-confirm-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
.stop-confirm-actions button {
  padding: 6px 16px;
  border-radius: 4px;
  border: 1px solid var(--border);
  cursor: pointer;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
}
.stop-confirm-actions button:hover {
  background: var(--bg-hover);
}
.stop-confirm-actions .btn-confirm-hard {
  border-color: var(--red);
  color: var(--red);
}
.stop-confirm-actions .btn-confirm-graceful {
  border-color: var(--yellow);
  color: var(--yellow);
}

/* Two-panel split container */
.detail-panels {
  flex: 1;
  display: flex;
  min-height: 0;
  overflow: hidden;
}

.detail-left-panel {
  flex: 1 1 50%;
  min-width: 250px;
  overflow-y: auto;
  padding: 12px 16px 12px 0;
}

.detail-right-panel {
  flex: 1 1 50%;
  min-width: 250px;
  display: flex;
  flex-direction: column;
  padding: 0 0 0 16px;
  overflow: hidden;
}

.transition-trail {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px 0;
  flex-shrink: 0;
  flex-wrap: wrap;
  font-size: 12px;
  border-bottom: 1px solid var(--border);
  min-height: 32px;
  color: var(--text-muted);
}

.transition-trail .badge {
  font-size: 10px;
  padding: 2px 6px;
}

.transition-trail .trail-arrow {
  color: var(--text-muted);
  font-size: 10px;
}

.transition-trail .badge:last-of-type {
  border-color: var(--accent);
  color: var(--accent);
}

.trail-badge-link {
  cursor: pointer;
}

.trail-badge-link:hover .badge {
  border-color: var(--accent);
  color: var(--text-bright);
}

.event-stream-scroll {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 8px 0;
}

/* Draggable divider */
.panel-divider {
  width: 6px;
  flex-shrink: 0;
  cursor: col-resize;
  background: var(--border);
  border-radius: 3px;
  transition: background 0.15s;
  position: relative;
}

.panel-divider:hover,
.panel-divider.dragging {
  background: var(--accent);
}

.panel-divider::after {
  content: '···';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(90deg);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 2px;
}

body.panel-resizing {
  cursor: col-resize !important;
  user-select: none;
}

body.panel-resizing .detail-left-panel,
body.panel-resizing .detail-right-panel {
  pointer-events: none;
}

/* Hypothesis card */
.hypothesis-card {
  background: linear-gradient(135deg, var(--bg-surface), #1e2340);
  border: 1px solid var(--accent-dim);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 10px;
}

.hypothesis-card h4 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--accent);
  margin-bottom: 4px;
}

.hypothesis-card .hypothesis-text {
  font-size: 14px;
  color: var(--text-bright);
  line-height: 1.5;
}

/* Left panel sections (agents, events count, LLM usage) */
.left-panel-section {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 10px;
}

.left-panel-section h4 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.sidebar-event-count {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--text-bright);
  text-align: center;
  margin: 4px 0;
}

.sidebar-event-label {
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
}

@media (max-width: 900px) {
  .detail-panels { flex-direction: column; }
  .detail-view { height: auto; overflow: visible; }
  .panel-divider {
    width: 100%;
    height: 6px;
    cursor: row-resize;
    pointer-events: none;
  }
  .panel-divider::after {
    transform: translate(-50%, -50%);
  }
  .detail-left-panel,
  .detail-right-panel {
    flex: none;
    min-width: unset;
    padding: 8px 0;
  }
  .detail-left-panel { max-height: 35vh; }
  .detail-right-panel { flex: 1; min-height: 40vh; }
  .detail-toolbar { gap: 6px; }
  .detail-toolbar .summary { max-width: 200px; }
}

details {
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  overflow: hidden;
}

details > summary {
  padding: 10px 16px;
  background: var(--bg-surface);
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  list-style: none;
  display: flex;
  align-items: center;
  gap: 8px;
  user-select: none;
}

details > summary::-webkit-details-marker { display: none; }

details > summary::before {
  content: '\25B6';
  font-size: 10px;
  transition: transform 0.2s;
  color: var(--text-muted);
}

details[open] > summary::before { transform: rotate(90deg); }

details > .content { padding: 12px 16px; }

.agent-section {
  border-color: var(--accent-dim);
}

.agent-section > summary {
  background: linear-gradient(135deg, var(--bg-surface), #1e2340);
}

.agent-name { color: var(--accent); text-transform: uppercase; }

.event {
  margin: 4px 0;
  padding: 6px 0;
  border-bottom: 1px solid #2a2e42;
}

.event:last-child { border-bottom: none; }

.event-ts {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  margin-right: 8px;
}

.event-label {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  margin-right: 6px;
}

.label-llm { color: var(--purple); }
.label-tool { color: var(--cyan); }
.label-transition { color: var(--green); }
.label-comment { color: var(--yellow); }
.label-progress { color: var(--text-muted); }
.label-error { color: var(--red); }
.label-agent { color: var(--accent); }

.event.tool-progress { opacity: 0.7; }
.hide-progress .event.tool-progress { display: none; }

.event-text {
  font-family: var(--font-mono);
  font-size: 13px;
  white-space: pre-wrap;
  word-break: break-word;
  background: var(--bg);
  border-radius: 6px;
  padding: 8px 12px;
  margin-top: 6px;
  max-height: 600px;
  overflow-y: auto;
  line-height: 1.5;
}

.event-text.short { max-height: none; }

.transition-banner {
  background: linear-gradient(135deg, #1a2a1a, #1a3a2a);
  border: 1px solid #2a4a2a;
  border-radius: 6px;
  padding: 8px 16px;
  margin: 8px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}

.transition-arrow { color: var(--green); font-size: 16px; }

.tool-call {
  border-left: 3px solid var(--cyan);
  padding-left: 12px;
  margin: 6px 0;
}

.tool-call .tool-name {
  font-family: var(--font-mono);
  font-weight: 600;
  color: var(--cyan);
  font-size: 13px;
}

.tool-result-ok { border-left-color: var(--green); }
.tool-result-err { border-left-color: var(--red); }


.poll-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
}

.poll-dot.live { background: var(--green); animation: pulse 2s infinite; }
.poll-dot.paused { background: var(--yellow); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.sys-prompt {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  max-height: 200px;
  overflow-y: auto;
  white-space: pre-wrap;
  background: var(--bg);
  border-radius: 4px;
  padding: 8px;
  margin-top: 6px;
}

.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.result-verdict {
  font-weight: 700;
  font-size: 15px;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.result-verdict.pass { color: var(--green); }
.result-verdict.fail { color: var(--red); }
.result-verdict.inconclusive { color: var(--yellow, #e2b340); }

.result-summary {
  font-size: 14px;
  color: var(--text-bright);
  margin-bottom: 12px;
  line-height: 1.5;
}

.result-detail {
  font-size: 13px;
  color: var(--text);
  line-height: 1.6;
  word-break: break-word;
}

.result-detail h1,
.result-detail h2,
.result-detail h3,
.result-detail h4 {
  color: var(--text-bright);
  margin: 12px 0 6px;
  font-size: 14px;
}

.result-detail h1 { font-size: 16px; }
.result-detail h2 { font-size: 15px; }

.result-detail p { margin: 6px 0; }

.result-detail ul,
.result-detail ol {
  margin: 6px 0;
  padding-left: 20px;
}

.result-detail code {
  font-family: var(--font-mono);
  background: var(--bg);
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 12px;
}

.result-detail pre {
  background: var(--bg);
  border-radius: 6px;
  padding: 8px 12px;
  margin: 6px 0;
  overflow-x: auto;
}

.result-detail pre code {
  background: none;
  padding: 0;
}

.result-detail table {
  border-collapse: collapse;
  margin: 8px 0;
  font-size: 12px;
}

.result-detail th,
.result-detail td {
  border: 1px solid var(--border);
  padding: 4px 8px;
}

.result-detail th {
  background: var(--bg-surface);
  color: var(--text-bright);
}

.result-detail strong { color: var(--text-bright); }

.result-chart {
  margin-top: 16px;
  max-width: 600px;
}

.result-chart canvas {
  max-height: 300px;
}

.results-link {
  display: inline-block;
  margin-top: 12px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  border: 1px solid var(--accent-dim);
  border-radius: 6px;
  text-decoration: none;
  transition: background 0.15s;
}

.results-link:hover {
  background: var(--accent-dim);
  color: var(--text-bright);
}

.fields-grid {
  display: grid;
  grid-template-columns: minmax(180px, auto) 1fr;
  gap: 4px 16px;
  font-size: 13px;
}

.field-key {
  font-weight: 600;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

.field-val {
  font-family: var(--font-mono);
  word-break: break-word;
}

.ticket-tokens {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--cyan);
  white-space: nowrap;
  text-align: right;
}

.ticket-cost {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--yellow);
  white-space: nowrap;
  text-align: right;
}

th.col-right { text-align: right; }

.agent-cost-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
  font-size: 11px;
}

.agent-cost-name {
  width: 70px;
  flex-shrink: 0;
  color: var(--cyan);
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.agent-cost-bar-bg {
  flex: 1;
  height: 6px;
  background: var(--bg);
  border-radius: 3px;
  overflow: hidden;
}

.agent-cost-bar {
  height: 100%;
  border-radius: 3px;
  background: var(--accent);
  transition: width 0.3s;
}

.agent-cost-val {
  width: 52px;
  flex-shrink: 0;
  text-align: right;
  color: var(--yellow);
  font-family: var(--font-mono);
}

.agent-cost-detail {
  font-size: 10px;
  color: var(--text-muted);
  margin-bottom: 6px;
  padding-left: 76px;
  font-family: var(--font-mono);
}

@media (max-width: 900px) {
  .container { padding: 0 12px; }
  .ticket-summary { max-width: 250px; }
}

.ai-disclaimer {
  background: linear-gradient(135deg, rgba(224, 175, 104, 0.15), rgba(255, 158, 100, 0.15));
  border-bottom: 1px solid var(--orange);
  padding: 12px 0;
  position: sticky;
  top: 61px;
  z-index: 99;
  transition: opacity 0.3s, transform 0.3s;
}

.ai-disclaimer.hidden {
  display: none;
}

.ai-disclaimer .container {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 14px;
  color: var(--orange);
  font-weight: 500;
}

.disclaimer-close {
  background: none;
  border: none;
  color: var(--orange);
  font-size: 24px;
  line-height: 1;
  cursor: pointer;
  padding: 0 8px;
  opacity: 0.7;
  transition: opacity 0.15s;
}

.disclaimer-close:hover {
  opacity: 1;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
</head>
<body>

<header>
  <div class="container">
    <h1><a href="#/" style="color: inherit; text-decoration: none;"><span>Agentic</span> Perf</a></h1>
    <div class="health-stats" id="health-stats"></div>
    <button class="toolbar-btn btn-stop-all" id="btn-stop-all-header" title="Stop all running agents">Stop All Tickets</button>
  </div>
</header>

<div id="ai-disclaimer" class="ai-disclaimer">
  <div class="container">
    <span>⚠️ AI-generated content may contain errors. Always verify before acting.</span>
    <button onclick="dismissDisclaimer()" class="disclaimer-close" title="Dismiss">&times;</button>
  </div>
</div>

<div class="container">
  <div id="app"></div>
</div>

<script>
const API = '/api/v1';

// AI Safety Disclaimer
function dismissDisclaimer() {
  const banner = document.getElementById('ai-disclaimer');
  if (banner) {
    banner.classList.add('hidden');
    localStorage.setItem('dismissedDisclaimer', 'true');
  }
}

window.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem('dismissedDisclaimer') === 'true') {
    const banner = document.getElementById('ai-disclaimer');
    if (banner) banner.classList.add('hidden');
  }
  var stopAllBtn = document.getElementById('btn-stop-all-header');
  if (stopAllBtn) {
    stopAllBtn.addEventListener('click', showStopAllConfirm);
  }
});

let currentView = 'list';
let currentTicketId = null;
let statusFilter = '';
let pollTimer = null;
let pollPaused = false;
let lastSeq = 0;
let autoScroll = true;
let renderedEvents = [];

const TERMINAL_STATUSES = new Set(['closed', 'awaiting_customer_guidance']);
function isTerminalStatus(s) { return TERMINAL_STATUSES.has(s); }

async function stopTicket(ticketId, mode) {
  try {
    var r = await fetch(API + '/tickets/' + ticketId + '/stop', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({mode: mode}),
    });
    if (r.status === 409) {
      var data = await r.json();
      alert(data.detail || 'Ticket is already in a terminal state.');
      return;
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var label = mode === 'hard' ? 'Hard stop' : 'Graceful stop';
    var btn = mode === 'hard'
      ? document.getElementById('btn-stop-hard')
      : document.getElementById('btn-stop-graceful');
    if (btn) { btn.textContent = label + ' requested'; btn.disabled = true; }
  } catch (err) {
    alert('Stop failed: ' + err.message);
  }
}

function showStopAllConfirm() {
  var overlay = document.createElement('div');
  overlay.className = 'stop-confirm-overlay';
  overlay.innerHTML =
    '<div class="stop-confirm-dialog">' +
      '<h3>Stop All Tickets</h3>' +
      '<p>This will request a stop for all active (non-terminal) tickets. ' +
        'Graceful stop lets agents finish their current action. ' +
        'Hard stop kills agents immediately.</p>' +
      '<div class="stop-confirm-actions">' +
        '<button onclick="this.closest(\'.stop-confirm-overlay\').remove()">Cancel</button>' +
        '<button class="btn-confirm-graceful" onclick="doStopAll(\'graceful\', this)">Graceful Stop</button>' +
        '<button class="btn-confirm-hard" onclick="doStopAll(\'hard\', this)">Hard Stop</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.remove();
  });
}

async function doStopAll(mode, btn) {
  try {
    var r = await fetch(API + '/stop-all', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({mode: mode}),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var data = await r.json();
    var overlay = btn.closest('.stop-confirm-overlay');
    if (overlay) overlay.remove();
    var label = mode === 'hard' ? 'Hard stop' : 'Graceful stop';
    alert(label + ' requested for ' + data.count + ' ticket(s).');
  } catch (err) {
    alert('Stop all failed: ' + err.message);
  }
}

async function api(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(`API ${r.status}: ${path}`);
  return r.json();
}

function navigate(hash) {
  window.location.hash = hash;
}

function parseRoute() {
  const hash = window.location.hash || '#/';
  const match = hash.match(/^#\/ticket\/(.+)$/);
  if (match) return { view: 'detail', ticketId: match[1] };
  return { view: 'list' };
}

window.addEventListener('hashchange', () => {
  const route = parseRoute();
  if (route.view !== currentView || route.ticketId !== currentTicketId) {
    currentView = route.view;
    currentTicketId = route.ticketId || null;
    stopPolling();
    render();
  }
});

function fmtTime(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    return d.toLocaleString(undefined, {
      month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
  } catch { return ts; }
}

function fmtTimeShort(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    return d.toLocaleTimeString(undefined, {
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
  } catch { return ts; }
}

function statusBadge(status) {
  const label = status.replace(/_/g, ' ');
  return '<span class="badge badge-' + status + '">' + label + '</span>';
}

function escHtml(s) {
  if (typeof s !== 'string') s = String(s);
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMarkdown(s) {
  if (typeof marked !== 'undefined' && marked.parse) {
    try { return marked.parse(s); } catch (e) { /* fall through */ }
  }
  return '<pre>' + escHtml(s) + '</pre>';
}

function truncate(s, n) {
  if (!s || s.length <= n) return s;
  return s.slice(0, n) + '...';
}

function prettyJson(obj) {
  try {
    if (typeof obj === 'string') obj = JSON.parse(obj);
    return JSON.stringify(obj, null, 2);
  } catch { return String(obj); }
}

function fmtCost(usd) {
  if (usd === 0) return '$0.00';
  if (usd < 0.01) return '<$0.01';
  if (usd < 1) return '$' + usd.toFixed(3);
  return '$' + usd.toFixed(2);
}

function fmtCachePct(usage) {
  var cached = (usage.cache_read_input_tokens || 0);
  var total = (usage.input_tokens || 0);
  if (!total || !cached) return '';
  var pct = Math.round((cached / total) * 100);
  return pct + '% cached';
}

async function refreshHealth() {
  try {
    var results = await Promise.all([
      api('/health'),
      api('/usage/summary').catch(function() { return null; }),
    ]);
    var data = results[0];
    var usage = results[1];
    var el = document.getElementById('health-stats');
    if (!el) return;
    var counts = data.ticket_counts || {};
    var active = data.total - (counts.closed || 0);
    var html =
      '<span>Total: <span class="stat-val">' + data.total + '</span></span>' +
      '<span>Active: <span class="stat-val">' + active + '</span></span>';
    if (usage && usage.global && usage.global.total_tokens > 0) {
      var g = usage.global;
      var gCachePct = '';
      var gCacheRead = 0, gCacheIn = 0;
      var bt = usage.by_ticket || {};
      for (var tid in bt) {
        gCacheRead += bt[tid].cache_read_input_tokens || 0;
        gCacheIn += bt[tid].input_tokens || 0;
      }
      if (gCacheIn > 0 && gCacheRead > 0) {
        gCachePct = ' <span style="color:var(--text-muted); font-size:11px">(' +
          Math.round((gCacheRead / gCacheIn) * 100) + '% cached)</span>';
      }
      html +=
        '<span>Tokens: <span class="stat-val" style="color:var(--cyan)">' +
          g.total_tokens.toLocaleString() + '</span>' + gCachePct + '</span>' +
        '<span>Cost: <span class="stat-val" style="color:var(--yellow)">' +
          fmtCost(g.estimated_cost_usd) + '</span></span>';
    }
    el.innerHTML = html;
  } catch {}
}

setInterval(refreshHealth, 10000);
refreshHealth();

// ── Ticket List ──

async function renderList() {
  const app = document.getElementById('app');
  app.innerHTML =
    '<div class="filters">' +
      '<label>Status:</label>' +
      '<select id="status-filter">' +
        '<option value="">All</option>' +
        '<option value="new">New</option>' +
        '<option value="triage_pending">Triage Pending</option>' +
        '<option value="gathering_context">Gathering Context</option>' +
        '<option value="planning_investigation">Planning Investigation</option>' +
        '<option value="awaiting_hardware">Awaiting Hardware</option>' +
        '<option value="awaiting_provision">Awaiting Provision</option>' +
        '<option value="executing_benchmark">Executing Benchmark</option>' +
        '<option value="evaluating_convergence">Evaluating Convergence</option>' +
        '<option value="awaiting_review">Awaiting Review</option>' +
        '<option value="synthesizing_results">Synthesizing Results</option>' +
        '<option value="awaiting_teardown">Awaiting Teardown</option>' +
        '<option value="awaiting_customer_guidance">Awaiting Guidance</option>' +
        '<option value="retrospective_pending">Retrospective</option>' +
        '<option value="closed">Closed</option>' +
      '</select>' +
    '</div>' +
    '<div id="ticket-table"><div class="spinner"></div> Loading...</div>';

  const sel = document.getElementById('status-filter');
  sel.value = statusFilter;
  sel.addEventListener('change', function() {
    statusFilter = sel.value;
    loadTickets();
  });

  await loadTickets();
  pollTimer = setInterval(loadTickets, 5000);
}

async function loadTickets() {
  try {
    var qs = statusFilter ? '?status=' + statusFilter : '';
    var results = await Promise.all([
      api('/tickets' + qs),
      api('/usage/summary').catch(function() { return null; }),
    ]);
    var tickets = results[0];
    var usage = results[1];
    var byTicket = (usage && usage.by_ticket) || {};
    var el = document.getElementById('ticket-table');
    if (!el) return;

    if (!tickets || tickets.length === 0) {
      el.innerHTML =
        '<div class="empty-state">' +
          '<h3>No tickets found</h3>' +
          '<p>Submit a ticket via CLI: <code>agentic-perf submit "summary" -d "description"</code></p>' +
        '</div>';
      return;
    }

    var sorted = tickets.sort(function(a, b) {
      return new Date(b.created_at) - new Date(a.created_at);
    });

    var rows = '';
    for (var i = 0; i < sorted.length; i++) {
      var t = sorted[i];
      var tu = byTicket[t.id];
      var cachePct = tu ? fmtCachePct(tu) : '';
      var tokHtml = tu
        ? tu.total_tokens.toLocaleString() +
          (cachePct ? ' <span style="color:var(--text-muted); font-size:11px">(' + cachePct + ')</span>' : '')
        : '&mdash;';
      var costHtml = tu ? fmtCost(tu.estimated_cost_usd) : '&mdash;';
      rows +=
        '<tr class="ticket-row" data-id="' + escHtml(t.id) + '">' +
          '<td class="ticket-id">' + escHtml(t.id) + '</td>' +
          '<td class="ticket-summary">' + escHtml(t.summary) + '</td>' +
          '<td>' + statusBadge(t.status) + '</td>' +
          '<td class="ticket-tokens">' + tokHtml + '</td>' +
          '<td class="ticket-cost">' + costHtml + '</td>' +
          '<td class="ticket-time">' + fmtTime(t.created_at) + '</td>' +
          '<td class="ticket-time">' + fmtTime(t.updated_at) + '</td>' +
        '</tr>';
    }

    el.innerHTML =
      '<table>' +
        '<thead><tr>' +
          '<th>Ticket</th><th>Summary</th><th>Status</th>' +
          '<th class="col-right">Tokens</th><th class="col-right">Cost</th>' +
          '<th>Created</th><th>Updated</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>';

    el.querySelectorAll('.ticket-row').forEach(function(row) {
      row.addEventListener('click', function() {
        navigate('#/ticket/' + row.dataset.id);
      });
    });
  } catch (err) {
    var el = document.getElementById('ticket-table');
    if (el) el.innerHTML = '<p style="color:var(--red)">Error loading tickets: ' + escHtml(err.message) + '</p>';
  }
}

// ── Ticket Detail ──

async function renderDetail(ticketId) {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="spinner"></div> Loading ticket...';

  try {
    const ticket = await api('/tickets/' + ticketId);
    lastSeq = 0;
    renderedEvents = [];
    trailStates = [];

    app.innerHTML =
      '<div class="detail-view">' +
        '<div class="detail-toolbar">' +
          '<div class="breadcrumb">' +
            '<a href="#/">Dashboard</a> / ' + escHtml(ticket.id) +
          '</div>' +
          '<span class="summary">' + escHtml(ticket.summary) + '</span>' +
          '<span id="detail-status-badge">' + statusBadge(ticket.status) + '</span>' +
          '<div class="toolbar-controls">' +
            '<button class="toolbar-btn active" id="btn-poll-toggle">' +
              '<span class="poll-dot live" id="poll-dot"></span> Live' +
            '</button>' +
            '<button class="toolbar-btn active" id="btn-auto-scroll">Scroll</button>' +
            '<button class="toolbar-btn" id="btn-top">&uarr; Top</button>' +
            '<button class="toolbar-btn" id="btn-bottom">&darr; Bottom</button>' +
            '<button class="toolbar-btn active" id="btn-progress-toggle">Progress</button>' +
            '<button class="toolbar-btn" id="btn-collapse-all">Collapse</button>' +
            '<button class="toolbar-btn" id="btn-expand-all">Expand</button>' +
            (isTerminalStatus(ticket.status) ? '' :
              '<span style="border-left:1px solid var(--border); height:16px; margin:0 4px;"></span>' +
              '<button class="toolbar-btn btn-stop-graceful" id="btn-stop-graceful" title="Finish current action, then pause">Pause</button>' +
              '<button class="toolbar-btn btn-stop-hard" id="btn-stop-hard" title="Kill agent immediately">Stop</button>'
            ) +
          '</div>' +
        '</div>' +
        '<div class="detail-panels" id="detail-panels">' +
          '<div class="detail-left-panel" id="detail-left-panel">' +
            renderDescription(ticket) +
            '<div id="hypothesis-section">' + renderHypothesisCard(ticket) + '</div>' +
            '<div id="result-section">' + renderCustomFields(ticket) + '</div>' +
            '<div class="left-panel-section">' +
              '<h4>Events</h4>' +
              '<div class="sidebar-event-count" id="event-count">0</div>' +
              '<div class="sidebar-event-label">events loaded</div>' +
            '</div>' +
            '<div class="left-panel-section">' +
              '<h4>LLM Usage</h4>' +
              '<div id="llm-usage" style="font-size:12px; color:var(--text-muted);">' +
                'Waiting for data...' +
              '</div>' +
            '</div>' +
          '</div>' +
          '<div class="panel-divider" id="panel-divider"></div>' +
          '<div class="detail-right-panel">' +
            '<div class="transition-trail" id="transition-trail"></div>' +
            '<div class="event-stream-scroll" id="event-stream"></div>' +
          '</div>' +
        '</div>' +
      '</div>';

    document.getElementById('btn-poll-toggle').addEventListener('click', togglePoll);
    document.getElementById('btn-auto-scroll').addEventListener('click', toggleAutoScroll);
    document.getElementById('btn-top').addEventListener('click', function() {
      var stream = document.getElementById('event-stream');
      if (stream) stream.scrollTop = 0;
    });
    document.getElementById('btn-bottom').addEventListener('click', function() {
      var stream = document.getElementById('event-stream');
      if (stream) stream.scrollTop = stream.scrollHeight;
    });
    document.getElementById('btn-progress-toggle').addEventListener('click', function() {
      var stream = document.getElementById('event-stream');
      if (stream) stream.classList.toggle('hide-progress');
      this.classList.toggle('active');
    });
    document.getElementById('btn-collapse-all').addEventListener('click', function() {
      document.querySelectorAll('#event-stream details[open]').forEach(function(d) { d.open = false; });
    });
    document.getElementById('btn-expand-all').addEventListener('click', function() {
      document.querySelectorAll('#event-stream details.agent-section').forEach(function(d) { d.open = true; });
    });
    var stopGraceful = document.getElementById('btn-stop-graceful');
    if (stopGraceful) {
      stopGraceful.addEventListener('click', function() { stopTicket(ticketId, 'graceful'); });
    }
    var stopHard = document.getElementById('btn-stop-hard');
    if (stopHard) {
      stopHard.addEventListener('click', function() { stopTicket(ticketId, 'hard'); });
    }
    initPanelDivider();

    await pollEvents(ticketId);
    pollTimer = setInterval(function() { pollEvents(ticketId); }, 2000);
  } catch (err) {
    app.innerHTML =
      '<div class="breadcrumb"><a href="#/">Dashboard</a> / ' + escHtml(ticketId) + '</div>' +
      '<p style="color:var(--red); margin-top:20px;">Error: ' + escHtml(err.message) + '</p>';
  }
}

function renderHypothesisCard(ticket) {
  var fields = ticket.custom_fields || {};
  var hypothesis = fields.hypothesis;
  var verdict = fields.verdict;
  var summary = fields.review_summary;
  var detail = fields.detailed_analysis;
  var chartData = fields.chart_data;
  var resultsUrl = fields.results_url;
  if (!hypothesis && !verdict) return '';
  var html = '<div class="hypothesis-card">';
  html += '<h4>Hypothesis</h4>';
  if (hypothesis) {
    html += '<div class="hypothesis-text">' + escHtml(String(hypothesis)) + '</div>';
  }
  if (verdict) {
    var cls = 'inconclusive';
    var v = String(verdict).toLowerCase();
    if (v === 'pass' || v === 'passed' || v === 'meets_expectations' ||
        v === 'hypothesis_confirmed') cls = 'pass';
    else if (v === 'fail' || v === 'failed' || v === 'below_expectations' ||
        v === 'hypothesis_refuted') cls = 'fail';
    html += '<div class="result-verdict ' + cls + '" style="margin-top:12px">' +
      escHtml(String(verdict)) + '</div>';
    var hasDetails = summary || chartData || resultsUrl || detail;
    if (hasDetails) {
      html += '<details style="margin-top:8px; border:none;">' +
        '<summary style="font-size:12px; color:var(--text-muted); background:none; padding:4px 0;">' +
          'Results &amp; Analysis</summary>' +
        '<div class="content">';
      if (summary) {
        html += '<div class="result-summary">' + escHtml(String(summary)) + '</div>';
      }
      var chartId = 'hypo-chart-' + (ticket.id || '').replace(/[^a-zA-Z0-9]/g, '');
      if (chartData) {
        html += '<div class="result-chart"><canvas id="' + chartId + '"></canvas></div>';
      }
      if (resultsUrl) {
        html += '<a class="results-link" href="' + escHtml(String(resultsUrl)) +
          '" target="_blank">View detailed results &#8599;</a>';
      }
      if (detail) {
        html += '<div class="result-detail" style="margin-top:8px;">' +
          renderMarkdown(String(detail)) + '</div>';
      }
      html += '</div></details>';
      if (chartData) {
        setTimeout(function() {
          var det = document.querySelector('.hypothesis-card details');
          if (det) {
            det.addEventListener('toggle', function onToggle() {
              if (det.open) mountChart(chartId, chartData);
            });
            if (det.open) mountChart(chartId, chartData);
          }
        }, 0);
      }
    }
  }
  html += '</div>';
  return html;
}

function renderDescription(ticket) {
  if (!ticket.description) return '';
  return '<details style="margin-top: 16px;">' +
    '<summary>Description</summary>' +
    '<div class="content"><div class="event-text short">' + escHtml(ticket.description) + '</div></div>' +
  '</details>';
}

var CHART_COLORS = ['#7aa2f7', '#9ece6a', '#e0af68', '#ff9e64', '#bb9af7', '#7dcfff', '#f7768e'];

function mountChart(containerId, chartData) {
  var canvas = document.getElementById(containerId);
  if (!canvas || !chartData) return;
  var datasets = (chartData.datasets || []).map(function(ds, i) {
    var color = CHART_COLORS[i % CHART_COLORS.length];
    var cfg = { label: ds.label, data: ds.values, backgroundColor: color, borderColor: color };
    if (chartData.type === 'line') { cfg.fill = false; cfg.tension = 0.3; }
    if (chartData.type === 'doughnut') { cfg.backgroundColor = CHART_COLORS.slice(0, (ds.values || []).length); }
    return cfg;
  });
  new Chart(canvas, {
    type: chartData.type || 'bar',
    data: { labels: chartData.labels || [], datasets: datasets },
    options: {
      responsive: true,
      plugins: {
        title: { display: !!chartData.title, text: chartData.title || '', color: '#c0caf5' },
        legend: { labels: { color: '#c0caf5' } },
      },
      scales: chartData.type === 'doughnut' ? {} : {
        x: { ticks: { color: '#565f89' }, grid: { color: 'rgba(59,66,97,0.5)' } },
        y: { ticks: { color: '#565f89' }, grid: { color: 'rgba(59,66,97,0.5)' } },
      },
    },
  });
}

function renderCustomFields(ticket) {
  var fields = ticket.custom_fields;
  if (!fields || Object.keys(fields).length === 0) return '';

  var promoted = ['verdict', 'review_summary', 'detailed_analysis', 'chart_data', 'results_url', 'hypothesis'];
  var items = '';
  for (var k in fields) {
    if (promoted.indexOf(k) !== -1) continue;
    var v = fields[k];
    var display = typeof v === 'object' ? JSON.stringify(v, null, 2) : String(v);
    items += '<span class="field-key">' + escHtml(k) + '</span>' +
             '<span class="field-val">' + escHtml(display) + '</span>';
  }
  var rest = '';
  if (items) {
    rest = '<details style="margin-top: 8px;">' +
      '<summary>Custom Fields</summary>' +
      '<div class="content"><div class="fields-grid">' + items + '</div></div>' +
    '</details>';
  }
  return rest;
}

// ── Event Polling & Rendering ──

async function refreshResultSection(ticketId) {
  if (!ticketId) return;
  try {
    var ticket = await api('/tickets/' + ticketId);
    var el = document.getElementById('result-section');
    if (el) {
      el.innerHTML = renderCustomFields(ticket);
    }
    var hypo = document.getElementById('hypothesis-section');
    if (hypo) {
      hypo.innerHTML = renderHypothesisCard(ticket);
    }
  } catch {}
}

async function pollEvents(ticketId) {
  if (pollPaused) return;
  try {
    var data = await api('/tickets/' + ticketId + '/events?since=' + lastSeq + '&limit=500');
    var newEvents = data.events || [];
    if (newEvents.length > 0) {
      lastSeq = data.latest_seq;
      renderNewEvents(newEvents);
    }
    updateUsageSidebar(ticketId);
  } catch {}
}

async function updateUsageSidebar(ticketId) {
  try {
    var data = await api('/tickets/' + ticketId + '/usage');
    var el = document.getElementById('llm-usage');
    if (!el || !data.usage) return;
    var u = data.usage;
    if (u.llm_calls === 0) {
      el.innerHTML = '<span style="color:var(--text-muted)">No LLM calls yet</span>';
      return;
    }
    var cost = data.estimated_cost_usd;
    var uCachePct = fmtCachePct(u);
    el.innerHTML =
      '<div style="margin-bottom:4px">' +
        '<span style="color:var(--cyan); font-size:16px; font-weight:700">' +
          u.total_tokens.toLocaleString() + '</span>' +
        '<span style="color:var(--text-muted)"> tokens</span>' +
        (uCachePct ? '<span style="color:var(--text-muted); font-size:11px; margin-left:6px">(' + uCachePct + ')</span>' : '') +
      '</div>' +
      '<div style="margin-bottom:4px; font-size:11px; font-family:var(--font-mono)">' +
        u.input_tokens.toLocaleString() + ' in / ' +
        u.output_tokens.toLocaleString() + ' out' +
      '</div>' +
      '<div style="margin-bottom:4px">' +
        '<span style="color:var(--green)">' + u.llm_calls + '</span> calls' +
        ' &middot; ' + (u.total_duration_ms / 1000).toFixed(1) + 's' +
      '</div>' +
      '<div style="margin-bottom:4px">' +
        'Est. <span style="color:var(--yellow); font-size:14px; font-weight:700">' +
          fmtCost(cost) + '</span>' +
      '</div>' +
      '';

    var agents = data.by_agent || {};
    var agentNames = Object.keys(agents);
    if (agentNames.length > 0) {
      agentNames.sort(function(a, b) {
        return (agents[b].estimated_cost_usd || 0) - (agents[a].estimated_cost_usd || 0);
      });
      var maxCost = agents[agentNames[0]].estimated_cost_usd || 1;
      var agentHtml = '<div style="margin-top:8px; border-top:1px solid var(--border); padding-top:8px">';
      agentHtml += '<div style="color:var(--text-muted); font-size:10px; text-transform:uppercase; ' +
        'letter-spacing:0.5px; margin-bottom:6px">By Agent</div>';
      for (var ai = 0; ai < agentNames.length; ai++) {
        var an = agentNames[ai];
        var au = agents[an];
        var acost = au.estimated_cost_usd || 0;
        var pct = maxCost > 0 ? Math.round((acost / maxCost) * 100) : 0;
        var shortName = an.replace(/-agent$/, '');
        var agentCache = fmtCachePct(au);
        agentHtml +=
          '<div class="agent-cost-row">' +
            '<span class="agent-cost-name" title="' + escHtml(an) + '">' + escHtml(shortName) + '</span>' +
            '<span class="agent-cost-bar-bg">' +
              '<span class="agent-cost-bar" style="width:' + pct + '%"></span>' +
            '</span>' +
            '<span class="agent-cost-val">' + fmtCost(acost) + '</span>' +
          '</div>' +
          '<div class="agent-cost-detail">' +
            au.total_tokens.toLocaleString() + 't' +
            (agentCache ? ' (' + agentCache + ')' : '') +
            ' &middot; ' +
            au.llm_calls + ' calls &middot; ' +
            (au.total_duration_ms / 1000).toFixed(1) + 's' +
          '</div>' +
          ((au.models_used && au.models_used.length > 0) ?
            '<div style="font-size:9px; color:var(--text-muted); margin-left:4px; margin-bottom:4px">' +
              au.models_used.join(', ') +
            '</div>' : '');
      }
      agentHtml += '</div>';
      el.innerHTML += agentHtml;
    }
  } catch {}
}

function renderNewEvents(events) {
  var container = document.getElementById('event-stream');
  if (!container) return;

  for (var i = 0; i < events.length; i++) {
    var evt = events[i];
    if (evt.event_type === 'transition' && evt.data && evt.data.to) {
      appendTransitionTrail(evt.data.to);
      trackAgentPhase(evt);
    }
  }

  for (var i = 0; i < events.length; i++) {
    var evt = events[i];
    if (renderedEvents.indexOf(evt.seq) !== -1) continue;
    renderedEvents.push(evt.seq);
    if (evt.event_type !== 'transition') trackAgentPhase(evt);
    var html = renderEvent(evt);
    if (html) container.insertAdjacentHTML('beforeend', html);
  }

  var countEl = document.getElementById('event-count');
  if (countEl) countEl.textContent = renderedEvents.length;

  if (autoScroll) {
    container.scrollTop = container.scrollHeight;
  }
}

function trackAgentPhase(evt) {
  if (evt.event_type === 'transition') {
    var statusEl = document.getElementById('detail-status-badge');
    if (statusEl && evt.data && evt.data.to) {
      statusEl.innerHTML = statusBadge(evt.data.to);
      refreshResultSection(currentTicketId);
    }
  }
}

var trailStates = [];

var STATUS_AGENT_NAME = {
  'triage_pending': 'triage-agent',
  'awaiting_hardware': 'resource-agent',
  'awaiting_provision': 'provisioning-agent',
  'executing_benchmark': 'benchmark-agent',
  'awaiting_review': 'review-agent',
  'awaiting_teardown': 'resource-teardown-agent',
  'retrospective_pending': 'retrospective-agent',
};

function appendTransitionTrail(status) {
  if (trailStates.length && trailStates[trailStates.length - 1] === status) return;
  trailStates.push(status);
  rebuildTrail();
}

function rebuildTrail() {
  var trail = document.getElementById('transition-trail');
  if (!trail) return;
  var html = '';
  for (var i = 0; i < trailStates.length; i++) {
    if (i > 0) html += '<span class="trail-arrow">&rarr;</span>';
    html += '<span class="trail-badge-link" data-trail-idx="' + i + '">' +
      statusBadge(trailStates[i]) + '</span>';
  }
  trail.innerHTML = html;
  trail.querySelectorAll('.trail-badge-link').forEach(function(el) {
    el.addEventListener('click', function() {
      var idx = parseInt(el.dataset.trailIdx);
      scrollToAgentForTrail(idx);
    });
  });
}

function scrollToAgentForTrail(trailIdx) {
  var status = trailStates[trailIdx];
  var agentName = STATUS_AGENT_NAME[status];
  var container = document.getElementById('event-stream');
  var sections = document.querySelectorAll('#event-stream .agent-section');
  if (!container || !sections.length) return;

  if (agentName) {
    var occurrence = 0;
    for (var i = 0; i < trailIdx; i++) {
      if (trailStates[i] === status) occurrence++;
    }
    var found = 0;
    for (var j = 0; j < sections.length; j++) {
      var nameEl = sections[j].querySelector('.agent-name');
      if (nameEl && nameEl.textContent === agentName) {
        if (found === occurrence) {
          sections[j].open = true;
          container.scrollTop = sections[j].offsetTop - container.offsetTop;
          return;
        }
        found++;
      }
    }
  }

  if (sections.length > 0) {
    var last = sections[sections.length - 1];
    last.open = true;
    container.scrollTop = last.offsetTop - container.offsetTop;
  }
}

function renderEvent(evt) {
  var etype = evt.event_type;
  var data = evt.data || {};
  var ts = fmtTimeShort(evt.timestamp);
  var agent = evt.agent || '';

  switch (etype) {
    case 'agent_started':
      return renderAgentStarted(evt, ts, agent, data);

    case 'agent_finished':
      return '<div class="event">' +
        '<span class="event-ts">' + ts + '</span>' +
        '<span class="event-label label-agent">FINISHED</span>' +
        '<span style="color:var(--text-muted)">' + escHtml(agent) + '</span>' +
      '</div>';

    case 'agent_error':
      return '<div class="event">' +
        '<span class="event-ts">' + ts + '</span>' +
        '<span class="event-label label-error">ERROR</span>' +
        '<span>' + escHtml(agent) + ': ' + escHtml(data.reason || 'Unknown error') + '</span>' +
      '</div>';

    case 'llm_request':
      return '<div class="event">' +
        '<span class="event-ts">' + ts + '</span>' +
        '<span class="event-label label-llm">LLM REQUEST</span>' +
        '<span style="color:var(--text-muted)">iteration ' + (data.iteration || '?') + '</span>' +
      '</div>';

    case 'llm_response':
      return renderLlmResponse(ts, data);

    case 'llm_usage':
      return renderLlmUsage(ts, data);

    case 'tool_called':
      return renderToolCalled(ts, data);

    case 'tool_result':
      return renderToolResult(ts, data);

    case 'tool_skipped':
      return '<div class="event">' +
        '<span class="event-ts">' + ts + '</span>' +
        '<span class="event-label label-tool">TOOL SKIPPED</span>' +
        '<span style="color:var(--text-muted)">' + escHtml(data.tool || '?') + ': ' + escHtml(data.reason || '') + '</span>' +
      '</div>';

    case 'transition':
      return '';

    case 'tool_progress':
      return '<div class="event tool-progress">' +
        '<span class="event-ts">' + ts + '</span>' +
        '<span class="event-label label-progress">PROGRESS</span>' +
        '<span style="color:var(--text-muted)">(' + escHtml(agent) + ') ' + escHtml(data.body || '') + '</span>' +
      '</div>';

    case 'comment':
      return '<div class="event">' +
        '<span class="event-ts">' + ts + '</span>' +
        '<span class="event-label label-comment">COMMENT</span>' +
        '<span style="color:var(--text-muted)">(' + escHtml(agent) + ')</span>' +
        '<div class="event-text short">' + escHtml(data.body || '') + '</div>' +
      '</div>';

    default:
      return '<div class="event">' +
        '<span class="event-ts">' + ts + '</span>' +
        '<span class="event-label" style="color:var(--text-muted)">' + escHtml(etype) + '</span>' +
      '</div>';
  }
}

function renderAgentStarted(evt, ts, agent, data) {
  var sysPrompt = data.system_prompt || '';
  var initialMsgs = data.initial_messages || [];

  var promptHtml = '';
  if (sysPrompt) {
    promptHtml =
      '<details>' +
        '<summary style="font-size:12px; color:var(--text-muted);">System Prompt (' + sysPrompt.length + ' chars)</summary>' +
        '<div class="content"><div class="sys-prompt">' + escHtml(sysPrompt) + '</div></div>' +
      '</details>';
  }

  var msgsHtml = '';
  for (var i = 0; i < initialMsgs.length; i++) {
    var m = initialMsgs[i];
    var role = (m.role || '?').toUpperCase();
    var content = typeof m.content === 'string' ? m.content : JSON.stringify(m.content, null, 2);
    msgsHtml +=
      '<details>' +
        '<summary style="font-size:12px;">' + role + ' message (' + content.length + ' chars)</summary>' +
        '<div class="content"><div class="event-text">' + escHtml(content) + '</div></div>' +
      '</details>';
  }

  return '<details class="agent-section" open>' +
    '<summary>' +
      '<span class="agent-name">' + escHtml(agent) + '</span>' +
      '<span style="color:var(--text-muted); font-size:12px; margin-left:auto;">' + ts + '</span>' +
    '</summary>' +
    '<div class="content">' + promptHtml + msgsHtml + '</div>' +
  '</details>';
}

function renderLlmResponse(ts, data) {
  var text = data.text || '';
  var iteration = data.iteration || '?';
  var stop = data.stop_reason || '?';

  var textHtml = '';
  if (text) {
    if (text.length > 500) {
      textHtml =
        '<details>' +
          '<summary style="font-size:12px;">Response text (' + text.length + ' chars)</summary>' +
          '<div class="content"><div class="event-text">' + escHtml(text) + '</div></div>' +
        '</details>';
    } else {
      textHtml = '<div class="event-text short">' + escHtml(text) + '</div>';
    }
  }

  return '<div class="event">' +
    '<span class="event-ts">' + ts + '</span>' +
    '<span class="event-label label-llm">LLM RESPONSE</span>' +
    '<span style="color:var(--text-muted); font-size:12px;">iter ' + iteration + ', stop=' + stop +
      (data.duration_ms ? ' &middot; ' + (data.duration_ms / 1000).toFixed(1) + 's' : '') +
    '</span>' +
    textHtml +
  '</div>';
}

function renderLlmUsage(ts, data) {
  var inTok = (data.input_tokens || 0).toLocaleString();
  var outTok = (data.output_tokens || 0).toLocaleString();
  var model = data.model || '';
  var dur = data.duration_ms ? ' &middot; ' + (data.duration_ms / 1000).toFixed(1) + 's' : '';
  return '<div class="event">' +
    '<span class="event-ts">' + ts + '</span>' +
    '<span class="event-label" style="background:var(--cyan); color:#000">TOKENS</span>' +
    '<span style="color:var(--text-muted); font-size:12px;">' +
      inTok + ' in &middot; ' + outTok + ' out' + dur +
      (model ? ' &middot; ' + escHtml(model) : '') +
    '</span>' +
  '</div>';
}

function renderToolCalled(ts, data) {
  var tool = data.tool || '?';
  var input = data.input;
  var inputHtml = '';

  if (input) {
    var formatted = typeof input === 'object' ? prettyJson(input) : String(input);
    if (formatted.length > 300) {
      inputHtml =
        '<details>' +
          '<summary style="font-size:12px; color:var(--text-muted);">Input (' + formatted.length + ' chars)</summary>' +
          '<div class="content"><div class="event-text">' + escHtml(formatted) + '</div></div>' +
        '</details>';
    } else {
      inputHtml = '<div class="event-text short">' + escHtml(formatted) + '</div>';
    }
  }

  return '<div class="event">' +
    '<div class="tool-call">' +
      '<span class="event-ts">' + ts + '</span>' +
      '<span class="event-label label-tool">TOOL</span>' +
      '<span class="tool-name">' + escHtml(tool) + '</span>' +
      inputHtml +
    '</div>' +
  '</div>';
}

function renderToolResult(ts, data) {
  var tool = data.tool || '?';
  var isError = data.is_error;
  var content = data.content;
  var contentLen = data.content_length || 0;

  var cls = isError ? 'tool-result-err' : 'tool-result-ok';
  var errTag = isError ? ' <span style="color:var(--red)">ERROR</span>' : '';

  var contentHtml = '';
  if (content != null) {
    var formatted;
    try {
      var parsed = JSON.parse(content);
      formatted = JSON.stringify(parsed, null, 2);
    } catch (e) {
      formatted = String(content);
    }
    if (formatted.length > 500) {
      contentHtml =
        '<details>' +
          '<summary style="font-size:12px; color:var(--text-muted);">Result (' + formatted.length + ' chars)</summary>' +
          '<div class="content"><div class="event-text">' + escHtml(formatted) + '</div></div>' +
        '</details>';
    } else {
      contentHtml = '<div class="event-text short">' + escHtml(formatted) + '</div>';
    }
  } else if (contentLen > 0) {
    contentHtml = '<span style="color:var(--text-muted); font-size:12px;">(' + contentLen + ' bytes)</span>';
  }

  return '<div class="event">' +
    '<div class="tool-call ' + cls + '">' +
      '<span class="event-ts">' + ts + '</span>' +
      '<span class="event-label label-tool">RESULT' + errTag + '</span>' +
      '<span class="tool-name">' + escHtml(tool) + '</span>' +
      contentHtml +
    '</div>' +
  '</div>';
}

// ── Polling controls ──

function togglePoll() {
  pollPaused = !pollPaused;
  var btn = document.getElementById('btn-poll-toggle');
  var dot = document.getElementById('poll-dot');
  if (btn) {
    btn.classList.toggle('active', !pollPaused);
    btn.innerHTML = pollPaused
      ? '<span class="poll-dot paused" id="poll-dot"></span> Paused'
      : '<span class="poll-dot live" id="poll-dot"></span> Live';
  }
}

function toggleAutoScroll() {
  autoScroll = !autoScroll;
  var btn = document.getElementById('btn-auto-scroll');
  if (btn) {
    btn.classList.toggle('active', autoScroll);
    btn.textContent = autoScroll ? 'Scroll' : 'Scroll off';
  }
}

function initPanelDivider() {
  var divider = document.getElementById('panel-divider');
  var panels = document.getElementById('detail-panels');
  var left = document.getElementById('detail-left-panel');
  var right = document.querySelector('.detail-right-panel');
  if (!divider || !panels || !left || !right) return;

  var MIN_WIDTH = 250;

  divider.addEventListener('mousedown', function(e) {
    e.preventDefault();
    document.body.classList.add('panel-resizing');
    divider.classList.add('dragging');

    var startX = e.clientX;
    var startLeftWidth = left.getBoundingClientRect().width;
    var totalWidth = panels.getBoundingClientRect().width - divider.getBoundingClientRect().width;

    function onMouseMove(e) {
      var dx = e.clientX - startX;
      var newLeftWidth = startLeftWidth + dx;
      if (newLeftWidth < MIN_WIDTH) newLeftWidth = MIN_WIDTH;
      if (totalWidth - newLeftWidth < MIN_WIDTH) newLeftWidth = totalWidth - MIN_WIDTH;
      var leftPct = (newLeftWidth / totalWidth) * 100;
      left.style.flex = '0 0 ' + leftPct + '%';
      right.style.flex = '0 0 ' + (100 - leftPct) + '%';
    }

    function onMouseUp() {
      document.body.classList.remove('panel-resizing');
      divider.classList.remove('dragging');
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
    }

    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  });

  divider.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var touch = e.touches[0];
    document.body.classList.add('panel-resizing');
    divider.classList.add('dragging');

    var startX = touch.clientX;
    var startLeftWidth = left.getBoundingClientRect().width;
    var totalWidth = panels.getBoundingClientRect().width - divider.getBoundingClientRect().width;

    function onTouchMove(e) {
      var t = e.touches[0];
      var dx = t.clientX - startX;
      var newLeftWidth = startLeftWidth + dx;
      if (newLeftWidth < MIN_WIDTH) newLeftWidth = MIN_WIDTH;
      if (totalWidth - newLeftWidth < MIN_WIDTH) newLeftWidth = totalWidth - MIN_WIDTH;
      var leftPct = (newLeftWidth / totalWidth) * 100;
      left.style.flex = '0 0 ' + leftPct + '%';
      right.style.flex = '0 0 ' + (100 - leftPct) + '%';
    }

    function onTouchEnd() {
      document.body.classList.remove('panel-resizing');
      divider.classList.remove('dragging');
      document.removeEventListener('touchmove', onTouchMove);
      document.removeEventListener('touchend', onTouchEnd);
    }

    document.addEventListener('touchmove', onTouchMove);
    document.addEventListener('touchend', onTouchEnd);
  });
}

function stopPolling() {
  if (pollTimer) {
    clearInterval(pollTimer);
    pollTimer = null;
  }
  pollPaused = false;
  lastSeq = 0;
  renderedEvents = [];
}

// ── Main render ──

function render() {
  var route = parseRoute();
  currentView = route.view;
  currentTicketId = route.ticketId || null;

  if (route.view === 'detail' && route.ticketId) {
    renderDetail(route.ticketId);
  } else {
    renderList();
  }
}

render();
</script>
